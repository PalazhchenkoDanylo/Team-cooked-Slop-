[rfid]
source = serial
port = /dev/ttyACM0
baud = 115200
timeout = 1.0
file_path = /tmp/rfid_tag
file_poll_seconds = 0.25
debounce_seconds = 2.0

[network]
lan_interface = wlan0
wifi_interface = wlan0
vpn_interface = wg0

[auth]
authorized_keys_path = authorized_keys.txt
require_authorized_key = true
